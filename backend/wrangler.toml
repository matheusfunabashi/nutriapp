name = "sage-backend"
main = "src/index.ts"
compatibility_date = "2026-01-01"

# --- Cache (KV): product snapshots + bucketed explanations ---
# Create with:  wrangler kv namespace create CACHE
#               wrangler kv namespace create CACHE --preview
# then paste the ids below.
[[kv_namespaces]]
binding = "CACHE"
id = "d7591a27121647058da82ff5f0787914"
preview_id = "3deae660eb29480bb8a4e8a154516d3b"

# --- D1 (SQLite): product metadata + external-call log ---
# Create with:  wrangler d1 create sage   (paste database_id below)
[[d1_databases]]
binding = "DB"
database_name = "sage"
database_id = "99dba7b9-0a2f-4c3d-b893-bdfeea1e5591"

# --- R2: cached product pack shots (`product-images/{barcode}`) ---
# Create with:  wrangler r2 bucket create sage-product-images
# Preview:      wrangler r2 bucket create sage-product-images-preview
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "sage-product-images"
preview_bucket_name = "sage-product-images-preview"

[vars]
EXPLANATION_VERSION = "exp-v8"   # bump: v4 scoring engine live (factors from rule deltas)
KROGER_BASE_URL = "https://api.kroger.com"  # validated live; override if using api-ce

# Secrets (DO NOT put in this file) — set with:
#   wrangler secret put OPENAI_API_KEY
#   wrangler secret put USDA_API_KEY         # api.data.gov FoodData Central key
#   wrangler secret put KROGER_CLIENT_ID     # developer.kroger.com app
#   wrangler secret put KROGER_CLIENT_SECRET
